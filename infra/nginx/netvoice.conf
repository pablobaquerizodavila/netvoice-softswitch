server {
    listen 80;
    listen 8080;
    server_name eneural.org panel.eneural.org;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://eneural.org$request_uri; }
}
server {
    listen 443 ssl;
    listen 8443 ssl;
    server_name eneural.org;
    ssl_certificate     /etc/letsencrypt/live/eneural.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eneural.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    # ─── Security Headers ─────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    # Redirigir HTTP plano en puerto SSL a HTTPS
    error_page 497 https://$host:8443$request_uri;
    # LANDING PAGE
    location = / {
        root /home/pbaquerizo/web;
        try_files /index.html =404;
    }
    location = /app.jsx {
        root /home/pbaquerizo/web;
        add_header Content-Type "application/javascript; charset=utf-8";
    }
    location /assets/ {
        root /home/pbaquerizo/web;
        expires 7d;
    }
    # PANEL NETVOICE (React SPA)
    location /login {
        root /home/pbaquerizo/netvoice-softswitch/frontend/build;
        try_files /index.html =404;
    }
    location /app {
        root /home/pbaquerizo/netvoice-softswitch/frontend/build;
        try_files $uri $uri/ /index.html;
    }
    location /static/ {
        root /home/pbaquerizo/netvoice-softswitch/frontend/build;
        expires 1y;
    }
    # API FASTAPI



    location ~ ^/sac {
        root /home/pbaquerizo/netvoice-softswitch/frontend/build;
        try_files $uri $uri/ /index.html;
    }
    # Portal self-service
    location ~ ^/(registro|verificar|portal) {
        root /home/pbaquerizo/netvoice-softswitch/frontend/build;
        try_files $uri $uri/ /index.html;
    }

    # API v1 — Netvoice Softswitch
    location /v1/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location ~ ^/(auth|cdr|extensions|trunks|clientes|planes|did|metricas|usuarios|audit|docs|openapi|billing|reports|noc) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    # WEBSOCKET
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
    location /ws-asterisk/ {
        proxy_pass http://192.168.0.161:8088/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
        tcp_nodelay on;
    }
}

