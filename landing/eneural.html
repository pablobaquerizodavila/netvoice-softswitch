<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>eneural — Communication must survive</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     Tokens — derived from Netvoice Panel
     ============================================================ */
  :root {
    --bg:           #0a0e13;
    --bg-deep:      #070a0e;
    --surface-1:    #11161d;
    --surface-2:    #161c25;
    --surface-3:    #1c2330;
    --line:         rgba(255,255,255,0.06);
    --line-strong:  rgba(255,255,255,0.10);

    --text:         #e6e9ef;
    --text-2:       #b6bdc9;
    --muted:        rgba(255,255,255,0.42);
    --muted-2:      rgba(255,255,255,0.30);

    --mint:         #34d399;
    --mint-2:       #10b981;
    --mint-soft:    rgba(52,211,153,0.12);

    --blue:         #60a5fa;
    --blue-2:       #3b82f6;
    --blue-soft:    rgba(96,165,250,0.10);

    --amber:        #f59e0b;
    --amber-soft:   rgba(245,158,11,0.12);

    --red:          #f46363;
    --red-2:        #ef4444;
    --red-soft:     rgba(244,99,99,0.12);

    --font-sans: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;

    --radius:    10px;
    --radius-sm: 6px;

    --container:  1240px;
    --nav-h:      62px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--mint-soft); color: var(--mint); }

  .container {
    max-width: var(--container);
    margin: 0 auto;
    padding: 0 32px;
  }

  .mono { font-family: var(--font-mono); }
  .small { font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
  .muted { color: var(--muted); }
  em { font-style: italic; color: var(--mint); }

  /* ============================================================
     Reusable bits
     ============================================================ */
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 8px rgba(52,211,153,0.55);
    transition: opacity 0.4s ease, background 0.2s ease;
    display: inline-block;
    flex-shrink: 0;
  }
  .status-dot[data-on="false"] { opacity: 0.55; box-shadow: none; }
  .status-dot[data-warn="true"] { background: var(--amber); box-shadow: 0 0 8px rgba(245,158,11,0.55); }
  .status-dot[data-critical] { background: var(--red); box-shadow: 0 0 10px rgba(244,99,99,0.6); animation: blink 1.2s infinite; }

  @keyframes blink {
    0%, 60% { opacity: 1; }
    70%, 100% { opacity: 0.35; }
  }

  .logo-dot {
    width: 9px; height: 9px;
    background: var(--mint);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(52,211,153,0.6);
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: rgba(52,211,153,0.06);
    border: 1px solid rgba(52,211,153,0.18);
    border-radius: 999px;
    color: var(--mint);
  }
  .status-pill .small { color: var(--mint); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    cursor: pointer;
    border: 1px solid transparent;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--mint);
    color: #052017;
    font-weight: 600;
  }
  .btn-primary:hover { background: #4be0a6; }
  .btn-ghost {
    background: transparent;
    border-color: var(--line-strong);
    color: var(--text);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.18); }
  .btn-sm { padding: 7px 11px; font-size: 12px; }
  .btn-lg { padding: 14px 18px; font-size: 14px; }

  /* CTA acceder al panel */
  .btn-panel {
    background: var(--mint);
    color: #052017;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .btn-panel:hover { background: #4be0a6; }

  .eyebrow {
    color: var(--mint);
    margin-bottom: 18px;
  }

  /* ============================================================
     Nav
     ============================================================ */
  .nav {
    position: sticky;
    top: 0;
    z-index: 50;
    height: var(--nav-h);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 32px;
    background: rgba(10,14,19,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
  }
  .nav-links {
    display: flex;
    gap: 26px;
    justify-self: center;
    font-size: 13px;
    color: var(--text-2);
  }
  .nav-links a:hover { color: var(--text); }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 14px;
    justify-self: end;
  }

  /* ============================================================
     Section scaffolding
     ============================================================ */
  .section {
    padding: 130px 0;
    border-top: 1px solid var(--line);
    position: relative;
  }
  .section-head {
    margin-bottom: 60px;
    max-width: 780px;
  }
  .section-title {
    font-size: 56px;
    line-height: 1.04;
    letter-spacing: -0.025em;
    font-weight: 600;
    margin: 0;
  }
  .section-title .muted { color: var(--muted-2); }

  /* ============================================================
     Hero
     ============================================================ */
  .hero {
    position: relative;
    min-height: calc(100vh - var(--nav-h));
    padding: 100px 0 120px;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }
  .hero-grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 75%);
    pointer-events: none;
  }
  .signal-canvas {
    position: absolute;
    inset: auto 0 0 0;
    height: 55%;
    width: 100%;
    pointer-events: none;
    mask-image: linear-gradient(to top, black 40%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, black 40%, transparent 100%);
  }
  .hero-content {
    position: relative;
    max-width: var(--container);
    margin: 0 auto;
    padding: 0 32px;
    z-index: 2;
  }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--mint);
    padding: 8px 14px;
    background: rgba(52,211,153,0.04);
    border: 1px solid rgba(52,211,153,0.16);
    border-radius: 999px;
    margin-bottom: 36px;
  }
  .hero-eyebrow .dot {
    width: 6px; height: 6px;
    background: var(--mint);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(52,211,153,0.7);
  }
  .hero-title {
    font-size: clamp(56px, 8.5vw, 124px);
    line-height: 0.94;
    letter-spacing: -0.04em;
    font-weight: 600;
    margin: 0 0 32px;
    color: var(--text);
  }
  .hero-sub {
    max-width: 580px;
    font-size: 17px;
    line-height: 1.55;
    color: var(--text-2);
    margin: 0 0 36px;
  }
  .hero-sub strong { color: var(--text); font-weight: 600; }
  .hero-cta {
    display: flex;
    gap: 12px;
    margin-bottom: 80px;
  }
  .hero-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .meta-stat {
    padding: 22px 24px 22px 0;
    border-right: 1px solid var(--line);
  }
  .meta-stat:last-child { border-right: none; }
  .meta-stat:not(:first-child) { padding-left: 24px; }
  .meta-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 6px;
  }
  .meta-label { color: var(--muted); }

  /* ============================================================
     Cost of silence
     ============================================================ */
  .silence-panel {
    background: var(--surface-1);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
  }
  .silence-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--line);
  }
  .silence-bar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .silence-bar-left .mono { color: var(--red); letter-spacing: 0.08em; }
  .silence-bar-left .muted { color: var(--muted) !important; }
  .silence-bar-right { display: flex; gap: 8px; }
  .ctrl {
    background: transparent;
    border: 1px solid var(--line-strong);
    color: var(--text-2);
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-family: var(--font-mono);
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  .ctrl:hover { background: rgba(255,255,255,0.04); color: var(--text); }

  .silence-body {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
  }
  .silence-clock {
    padding: 36px 32px;
    border-right: 1px solid var(--line);
    background: linear-gradient(135deg, rgba(244,99,99,0.05), transparent 70%);
  }
  .clock-value {
    font-family: var(--font-mono);
    font-size: 64px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--red);
    margin: 8px 0;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 30px rgba(244,99,99,0.25);
  }
  .clock-sep { opacity: 0.4; padding: 0 2px; }

  .silence-stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
  }
  .silence-stat {
    padding: 28px 32px;
    border-bottom: 1px solid var(--line);
    border-right: 1px solid var(--line);
  }
  .silence-stat:nth-child(2n) { border-right: none; }
  .silence-stat:nth-last-child(-n+2) { border-bottom: none; }
  .silence-stat-value {
    font-family: var(--font-mono);
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-top: 8px;
    font-variant-numeric: tabular-nums;
  }
  .silence-footer {
    padding: 12px 18px;
    background: var(--surface-2);
    border-top: 1px solid var(--line);
  }

  /* ============================================================
     Platform grid
     ============================================================ */
  .platform-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .platform-card {
    background: var(--surface-1);
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: background 0.2s ease;
    position: relative;
  }
  .platform-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--mint), transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .platform-card:hover { background: var(--surface-2); }
  .platform-card:hover::before { opacity: 1; }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--mint);
  }
  .card-status .small { color: var(--mint); }
  .card-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
    line-height: 1.25;
  }
  .card-body {
    color: var(--text-2);
    font-size: 14px;
    line-height: 1.6;
    margin: 0;
    flex: 1;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .tag {
    padding: 4px 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--text-2);
    font-size: 10px;
  }

  /* ============================================================
     Telemetry — Netvoice Panel style frame
     ============================================================ */
  .telemetry-frame {
    background: var(--surface-1);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,0.5);
  }
  .telemetry-chrome {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--line);
  }
  .chrome-left { display: flex; align-items: center; gap: 12px; }
  .chrome-dots { display: flex; gap: 6px; }
  .chrome-dots span {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
  }
  .chrome-right {
    display: flex; align-items: center; gap: 8px;
    color: var(--mint);
  }

  .telemetry-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--line);
  }
  .tile {
    background: var(--surface-1);
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
  }
  .tile::before {
    content: "";
    position: absolute;
    top: 0; left: 16px; right: 16px;
    height: 1px;
    background: var(--blue);
    opacity: 0.6;
  }
  .tile:nth-child(2)::before { background: var(--mint); }
  .tile:nth-child(3)::before { background: var(--amber); }
  .tile:nth-child(4)::before { background: var(--blue); }
  .tile-wide { grid-column: span 1; }
  .tile-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tile-big {
    font-family: var(--font-mono);
    font-size: 34px;
    font-weight: 500;
    letter-spacing: -0.015em;
    color: var(--blue);
    margin: 4px 0;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .tile:nth-child(2) .tile-big { color: var(--mint); }
  .tile:nth-child(3) .tile-big { color: var(--amber); }
  .tile:nth-child(4) .tile-big { color: var(--blue); }
  .tile-big .unit { font-size: 18px; opacity: 0.7; margin-left: 2px; }
  .accent-up { color: var(--mint); }

  .sparkline {
    width: 100%;
    height: 28px;
    color: var(--blue);
    opacity: 0.85;
    margin-top: auto;
  }

  .tile-regions {
    grid-column: span 2;
    grid-row: span 2;
  }
  .tile-events {
    grid-column: span 2;
    grid-row: span 1;
  }
  .region-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 8px;
  }
  .region-row {
    display: grid;
    grid-template-columns: 12px 96px 1fr 120px 40px;
    gap: 10px;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--line);
  }
  .region-row:last-child { border-bottom: none; }
  .region-id { color: var(--text-2); text-transform: none; letter-spacing: 0; font-size: 11px; }
  .region-name { font-size: 13px; color: var(--text); }
  .region-bar {
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
  }
  .region-bar-fill {
    height: 100%;
    background: var(--mint);
    transition: width 0.6s ease;
  }
  .region-bar-fill[data-warn="true"] { background: var(--amber); }
  .region-load { color: var(--muted); font-size: 11px; text-align: right; text-transform: none; }

  .event-list {
    list-style: none;
    padding: 0;
    margin: 8px 0 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .event-row {
    display: grid;
    grid-template-columns: 64px 52px 1fr;
    gap: 12px;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--line);
  }
  .event-row:last-child { border-bottom: none; }
  .event-kind {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    text-align: center;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .event-ok   { background: var(--mint-soft);  color: var(--mint); }
  .event-warn { background: var(--amber-soft); color: var(--amber); }
  .event-info { background: var(--blue-soft);  color: var(--blue); }
  .event-label { color: var(--text-2); text-transform: none; letter-spacing: 0; font-size: 12px; }

  /* ============================================================
     Why
     ============================================================ */
  .section-why { background: var(--bg-deep); }
  .why-title {
    font-size: clamp(40px, 5.5vw, 76px);
    line-height: 1.04;
    letter-spacing: -0.03em;
    font-weight: 500;
    max-width: 900px;
    margin: 0 0 70px;
  }
  .why-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }
  .why-col p {
    font-size: 17px;
    line-height: 1.7;
    color: var(--text-2);
    margin: 0 0 24px;
    max-width: 480px;
  }
  .why-col strong { color: var(--text); font-weight: 600; }
  .why-tenets {
    display: flex;
    flex-direction: column;
    gap: 0;
    border-top: 1px solid var(--line);
  }
  .tenet {
    padding: 22px 0;
    border-bottom: 1px solid var(--line);
  }
  .tenet-title {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.015em;
    margin-bottom: 6px;
  }

  /* ============================================================
     Industries
     ============================================================ */
  .industries-grid {
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--line);
  }
  .industry-row {
    display: grid;
    grid-template-columns: 60px 260px 1fr auto;
    gap: 32px;
    align-items: center;
    padding: 28px 0;
    border-bottom: 1px solid var(--line);
    color: var(--text-2);
    transition: padding 0.2s ease;
    cursor: pointer;
  }
  .industry-row:hover { padding-left: 12px; color: var(--text); }
  .industry-row:hover .industry-name { color: var(--mint); }
  .industry-name {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
    transition: color 0.15s ease;
  }
  .industry-desc { font-size: 14px; line-height: 1.5; }

  /* ============================================================
     Closing
     ============================================================ */
  .section-closing {
    text-align: center;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(52,211,153,0.08), transparent 60%),
      var(--bg-deep);
    padding: 160px 0;
    border-top: 1px solid var(--line);
  }
  .closing-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--mint);
    padding: 8px 14px;
    background: rgba(52,211,153,0.05);
    border: 1px solid rgba(52,211,153,0.18);
    border-radius: 999px;
    margin-bottom: 40px;
  }
  .closing-title {
    font-size: clamp(64px, 9vw, 140px);
    line-height: 0.94;
    letter-spacing: -0.04em;
    font-weight: 600;
    margin: 0 0 32px;
  }
  .closing-sub {
    max-width: 560px;
    margin: 0 auto 48px;
    font-size: 17px;
    line-height: 1.6;
    color: var(--text-2);
  }
  .closing-cta {
    display: inline-flex;
    gap: 12px;
  }

  /* ============================================================
     Footer
     ============================================================ */
  .footer {
    border-top: 1px solid var(--line);
    padding: 60px 0 40px;
    background: var(--bg-deep);
  }
  .footer-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: start;
  }
  .footer-brand p { margin: 12px 0 0; max-width: 320px; }
  .footer-cols {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }
  .footer-col ul {
    list-style: none;
    padding: 0;
    margin: 14px 0 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .footer-col a {
    color: var(--text-2);
    font-size: 13px;
  }
  .footer-col a:hover { color: var(--mint); }
