[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
RECORDING_DIR=/var/spool/asterisk/recording
MEDIA_SERVER=192.168.0.18

[internal]
; Llamada interna con grabacion automatica
exten => _1XXX,1,NoOp(Llamada de ${CALLERID(num)} hacia ${EXTEN})
 same => n,Set(CALLFILENAME=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${CALLERID(num)}-${EXTEN})
 same => n,MixMonitor(${CALLFILENAME}.wav,b)
 same => n,Dial(PJSIP/${EXTEN}-webrtc,60)
 same => n,Dial(PJSIP/${EXTEN},60)
 same => n,StopMixMonitor()
 same => n,Hangup()

; Sala de conferencia
exten => _8XXX,1,NoOp(Sala conferencia ${EXTEN})
 same => n,Answer()
 same => n,ConfBridge(${EXTEN})
 same => n,Hangup()

; Buzón de voz
exten => _9XXX,1,NoOp(Voicemail ${EXTEN})
 same => n,Answer()
 same => n,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; Grabacion bajo demanda (*1 para iniciar, *2 para detener)
exten => *1,1,NoOp(Inicio grabacion manual)
 same => n,Set(CALLFILENAME=${RECORDING_DIR}/${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-manual-${CALLERID(num)})
 same => n,MixMonitor(${CALLFILENAME}.wav,b)
 same => n,Playback(beep)
 same => n,Return()

exten => *2,1,NoOp(Detener grabacion manual)
 same => n,StopMixMonitor()
 same => n,Playback(beep)
 same => n,Return()

[default]
exten => s,1,Hangup()

[from-media]
exten => s,1,Hangup()
